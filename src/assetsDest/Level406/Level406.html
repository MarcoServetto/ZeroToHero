<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forest Minigame</title>
  <link rel="stylesheet" href="../../resources/FontsSetUp.css">
  <link rel="stylesheet" href="../../resources/BaseStyle.css">
  <link rel="stylesheet" href="../../resources/RoundButtonsStyle.css">
  <link rel="stylesheet" href="../../resources/forest/Forest.css">
  <script type="text/javascript" src="../../resources/BaseJs.js" defer></script>
  <script type="text/javascript" src="../../resources/forest/Forest.js" defer></script>
</head>
<body  data-next="../Level407/Level407.html">
          <div id="gameArea">
			<svg class="forest" viewBox="0 0 2100 1000"
			  style="background:url('../../resources/forest/forestDawn.png')">
			  
              <g class="edge" onclick='travelPath("edge_0", 200, 200, 425.00, 275.00, 650, 350)'>
  <path class="hitPath" d='m 200 200 Q 425.00 275.00 650 350'/>
  <path class='path' d='m 200 200 Q 425.00 275.00 650 350' stroke-dasharray="16 16"/>
  <foreignObject x="400" y="180" width="580px" height="130px">
    <textarea
      id="edge_0"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >Rotate360:{&#10;  #(d: Direction): Direction-&gt;&#10;    d</textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_1", 650, 350, 570.71, 570.71, 350, 650)'>
  <path class="hitPath" d='m 650 350 Q 570.71 570.71 350 650'/>
  <path class='path' d='m 650 350 Q 570.71 570.71 350 650' stroke-dasharray="16 16"/>
  <foreignObject x="580" y="450" width="180px" height="70px">
    <textarea
      id="edge_1"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >.turn</textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_2", 650, 350, 429.29, 429.29, 350, 650)'>
  <path class="hitPath" d='m 650 350 Q 429.29 429.29 350 650'/>
  <path class='path' d='m 650 350 Q 429.29 429.29 350 650' stroke-dasharray="16 16"/>
  <foreignObject x="320" y="420" width="180px" height="70px">
    <textarea
      id="edge_2"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >.turn</textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_3", 650, 350, 775.00, 625.00, 900, 900)'>
  <path class="hitPath" d='m 650 350 Q 775.00 625.00 900 900'/>
  <path class='path' d='m 650 350 Q 775.00 625.00 900 900' stroke-dasharray="16 16"/>
  <foreignObject x="780" y="680" width="140px" height="110px">
    <textarea
      id="edge_3"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >;&#10;  }&#10;</textarea>
    </foreignObject>
</g>

              <path id="currentTravelingPath" class="hitPath"/>
              <circle class=""
  cx="200" cy="200"
  r="15"
  fill="red"
/>
<circle class=""
  cx="650" cy="350"
  r="15"
  fill="red"
/>
<circle class=""
  cx="350" cy="650"
  r="15"
  fill="red"
/>
<circle class="finishNode"
  cx="900" cy="900"
  r="15"
  fill="lightgreen"
/>
              
              <foreignObject
                id="foreignObjectCodeBox" x="0" y="0" width="0px" height="0px"
                style="pointer-events:none">
                <textarea
                  id="codeBoxOverlayTop"
                  class="overlayTextarea"
                  style="width:100%;height:100%;font-size:20px;overflow-x:auto;border:solid orange;opacity:1"
                  name="ForestCodeBox"
                  wrap="soft"
                  autocomplete="off"
                  spellcheck="false"
                  readonly></textarea>
                </foreignObject>
             <foreignobject
                x="0" y="0" width="100%" height="100%"
                style="pointer-events:none">
                <textarea class="overlayTextarea" id="output"
style="top:0%;left:60.00%;width:40%;height:60.00%;overflow-x:auto;pointer-events:auto"
name="ForestOutputBox"
data-solution="//The last tree broke, but not a clean break,&#10;//the trunk is ruined and not good for the palisade.&#10;//Panic: Rotating the tree just 90 degrees sometimes&#10;//does not work.&#10;&#10;//you: I think I know how to do this better!&#10;&#10;Rotate360:{&#10;  #(d: Direction): Direction-&gt;&#10;    d.turn.turn.turn.turn;&#10;  }&#10;"
data-original="//The last tree broke, but not a clean break,&#10;//the trunk is ruined and not good for the palisade.&#10;//Panic: Rotating the tree just 90 degrees sometimes&#10;//does not work.&#10;&#10;//you: I think I know how to do this better!&#10;&#10;"
autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" readonly>//The last tree broke, but not a clean break,&#10;//the trunk is ruined and not good for the palisade.&#10;//Panic: Rotating the tree just 90 degrees sometimes&#10;//does not work.&#10;&#10;//you: I think I know how to do this better!&#10;&#10;</textarea>

              </foreignobject>
              <image
                id="currentNodeMarker"
                href="../../resources/forest/face.png"
                width="80"
                height="80"
              />
            </svg>
            
            <div class="buttonContainer">
              <div class="roundBtn" data-tooltip="Check your work">
                <button id="submitBtn">🎉</button>
                </div>
				<div class="roundBtn" data-tooltip="Undo">
                  <button id="undoBtn">↩</button>
                  </div>
              <div class="roundBtn" data-tooltip="Reset">
                <button id="resetBtn">⟳</button>
                </div>
              </div>
          </div>
  <div id="screenOverlay"></div>
  <div id="gameMessage" class="messageBox" style="display: none;"></div>
  <div id="levelEndCharacter" class="divFullScreenImage" hidden>
    <img src="../../resources/weDidIt.png" alt="We did it!" draggable="false">
    </div>
  <div id="levelFail" class="divFullScreenImage" hidden>
    <img src="../../resources/walkFallEnd.png" alt="Oof!" draggable="false">
    </div>
</div>
</body>
</html>
