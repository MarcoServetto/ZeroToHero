<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forest Minigame</title>
  <link rel="stylesheet" href="../../resources/FontsSetUp.css">
  <link rel="stylesheet" href="../../resources/BaseStyle.css">
  <link rel="stylesheet" href="../../resources/RoundButtonsStyle.css">
  <link rel="stylesheet" href="../../resources/forest/Forest.css">
  <script type="text/javascript" src="../../resources/BaseJs.js" defer></script>
  <script type="text/javascript" src="../../resources/forest/Forest.js" defer></script>
</head>
<body  data-next="../Level404/Level404.html">
          <div id="gameArea">
			<svg class="forest" viewBox="0 0 1000 1000"
			  style="background:url('../../resources/forest/forestDawn.png')">
			  
              <g class="edge" onclick='travelPath("edge_0", 100, 100, 300.00, 0.00, 500, 100)'>
  <path class="hitPath" d='m 100 100 Q 300.00 0.00 500 100'/>
  <path class='path' d='m 100 100 Q 300.00 0.00 500 100' stroke-dasharray="16 16"/>
  <foreignObject x="550" y="200" width="300px" height="70px">
    <textarea
      id="edge_0"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >Direction</textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_1", 100, 100, 300.00, 200.00, 500, 100)'>
  <path class="hitPath" d='m 100 100 Q 300.00 200.00 500 100'/>
  <path class='path' d='m 100 100 Q 300.00 200.00 500 100' stroke-dasharray="16 16"/>
  <foreignObject x="50" y="200" width="280px" height="70px">
    <textarea
      id="edge_1"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >:{ .turn: </textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_2", 500, 100, 500.00, 300.00, 500, 500)'>
  <path class="hitPath" d='m 500 100 Q 500.00 300.00 500 500'/>
  <path class='path' d='m 500 100 Q 500.00 300.00 500 500' stroke-dasharray="16 16"/>
  <foreignObject x="300" y="620" width="250px" height="40px">
    <textarea
      id="edge_2"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >; }</textarea>
    </foreignObject>
</g>

              <path id="currentTravelingPath" class="hitPath"/>
              <circle class=""
  cx="100" cy="100"
  r="15"
  fill="red"
/>
<circle class=""
  cx="500" cy="100"
  r="15"
  fill="red"
/>
<circle class="finishNode"
  cx="500" cy="500"
  r="15"
  fill="lightgreen"
/>
              
			  <foreignObject
			    id="foreignObjectCodeBox" x="0" y="0" width="0px" height="0px"
				style="pointer-events:none">
	            <textarea
	              id="codeBoxOverlayTop"
	              class="overlayTextarea"
	              style="width:100%;height:100%;font-size:20px;overflow-x:auto;border:solid orange;opacity:1"
	              name="ForestCodeBox"
	              wrap="soft"
	              autocomplete="off"
	              spellcheck="false"
	              readonly></textarea>
	            </foreignObject>
              <image
                id="currentNodeMarker"
                href="../../resources/forest/face.png"
                width="80"
                height="80"
              />
            </svg>
            <textarea class="overlayTextarea" id="output"
style="top:0%;left:60.00%;width:40%;height:80.00%;overflow-x:auto;"
name="ForestOutputBox"
data-solution="//Go on the same path again to collect&#10;//the same code multiple times&#10;Direction:{ .turn: Direction; }"
data-original="//Go on the same path again to collect&#10;//the same code multiple times&#10;"
autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" readonly>//Go on the same path again to collect&#10;//the same code multiple times&#10;</textarea>

            <div class="buttonContainer">
              <div class="roundBtn" data-tooltip="Check your work">
                <button id="submitBtn">🎉</button>
                </div>
				<div class="roundBtn" data-tooltip="Undo">
                  <button id="undoBtn">↩</button>
                  </div>
              <div class="roundBtn" data-tooltip="Reset">
                <button id="resetBtn">⟳</button>
                </div>
              </div>
          </div>
  <div id="screenOverlay"></div>
  <div id="gameMessage" class="messageBox" style="display: none;"></div>
  <div id="levelEndCharacter" class="divFullScreenImage" hidden>
    <img src="../../resources/weDidIt.png" alt="We did it!" draggable="false">
    </div>
  <div id="levelFail" class="divFullScreenImage" hidden>
    <img src="../../resources/walkFallEnd.png" alt="Oof!" draggable="false">
    </div>
</div>
</body>
</html>
