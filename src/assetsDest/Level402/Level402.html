<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forest Minigame</title>
  <link rel="stylesheet" href="../../resources/FontsSetUp.css">
  <link rel="stylesheet" href="../../resources/BaseStyle.css">
  <link rel="stylesheet" href="../../resources/RoundButtonsStyle.css">
  <link rel="stylesheet" href="../../resources/forest/Forest.css">
  <script type="text/javascript" src="../../resources/BaseJs.js" defer></script>
  <script type="text/javascript" src="../../resources/forest/Forest.js" defer></script>
</head>
<body  data-next="../Level403/Level403.html">
          <div id="gameArea">
			<svg class="forest" viewBox="0 0 2100 1000"
			  style="background:url('../../resources/forest/forestDawn.png')">
			  
              <g class="edge" onclick='travelPath("edge_0", 340, 200, 300.00, 380.00, 260, 560)'>
  <path class="hitPath" d='m 340 200 Q 300.00 380.00 260 560'/>
  <path class='path' d='m 340 200 Q 300.00 380.00 260 560' stroke-dasharray="16 16"/>
  <foreignObject x="340" y="400" width="150px" height="40px">
    <textarea
      id="edge_0"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >{ .turn: </textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_1", 260, 560, 540.00, 580.00, 820, 600)'>
  <path class="hitPath" d='m 260 560 Q 540.00 580.00 820 600'/>
  <path class='path' d='m 260 560 Q 540.00 580.00 820 600' stroke-dasharray="16 16"/>
  <foreignObject x="300" y="620" width="200px" height="40px">
    <textarea
      id="edge_1"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >Direction; }</textarea>
    </foreignObject>
</g>

              <path id="currentTravelingPath" class="hitPath"/>
              <circle class=""
  cx="340" cy="200"
  r="15"
  fill="red"
/>
<circle class=""
  cx="260" cy="560"
  r="15"
  fill="red"
/>
<circle class="finishNode"
  cx="820" cy="600"
  r="15"
  fill="lightgreen"
/>
              
              <foreignObject
                id="foreignObjectCodeBox" x="0" y="0" width="0px" height="0px"
                style="pointer-events:none">
                <textarea
                  id="codeBoxOverlayTop"
                  class="overlayTextarea"
                  style="width:100%;height:100%;font-size:20px;overflow-x:auto;border:solid orange;opacity:1"
                  name="ForestCodeBox"
                  wrap="soft"
                  autocomplete="off"
                  spellcheck="false"
                  readonly></textarea>
                </foreignObject>
             <foreignobject
                x="0" y="0" width="2100" height="1000"
                style="pointer-events:none">
                <textarea class="overlayTextarea" id="output"
style="top:0%;left:60.00%;width:40%;height:60.00%;overflow-x:auto;pointer-events:auto"
name="ForestOutputBox"
data-solution="//This is the forest minigame.&#10;//Click on the path to walk and&#10;//collect the code on the path.&#10;//Reach the end (green) with&#10;//complete correct code&#10;/*&#10;Panic: It's quite easy to get&#10;lost here. Make sure to&#10;remember your directions!&#10;*/&#10;&#10;Direction:{ .turn: Direction; }"
data-original="//This is the forest minigame.&#10;//Click on the path to walk and&#10;//collect the code on the path.&#10;//Reach the end (green) with&#10;//complete correct code&#10;/*&#10;Panic: It's quite easy to get&#10;lost here. Make sure to&#10;remember your directions!&#10;*/&#10;&#10;Direction:"
autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" readonly>//This is the forest minigame.&#10;//Click on the path to walk and&#10;//collect the code on the path.&#10;//Reach the end (green) with&#10;//complete correct code&#10;/*&#10;Panic: It's quite easy to get&#10;lost here. Make sure to&#10;remember your directions!&#10;*/&#10;&#10;Direction:</textarea>

              </foreignobject>
              <image
                id="currentNodeMarker"
                href="../../resources/forest/face.png"
                width="80"
                height="80"
              />
            </svg>
            
            <div class="buttonContainer">
              <div class="roundBtn" data-tooltip="Check your work">
                <button id="submitBtn">🎉</button>
                </div>
				<div class="roundBtn" data-tooltip="Undo">
                  <button id="undoBtn">↩</button>
                  </div>
              <div class="roundBtn" data-tooltip="Reset">
                <button id="resetBtn">⟳</button>
                </div>
              </div>
          </div>
  <div id="screenOverlay"></div>
  <div id="gameMessage" class="messageBox" style="display: none;"></div>
  <div id="levelEndCharacter" class="divFullScreenImage" hidden>
    <img src="../../resources/weDidIt.png" alt="We did it!" draggable="false">
    </div>
  <div id="levelFail" class="divFullScreenImage" hidden>
    <img src="../../resources/walkFallEnd.png" alt="Oof!" draggable="false">
    </div>
</div>
</body>
</html>
