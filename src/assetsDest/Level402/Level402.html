<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forest Minigame</title>
  <link rel="stylesheet" href="../../resources/FontsSetUp.css">
  <link rel="stylesheet" href="../../resources/BaseStyle.css">
  <link rel="stylesheet" href="../../resources/RoundButtonsStyle.css">
  <link rel="stylesheet" href="../../resources/forest/Forest.css">
  <script type="text/javascript" src="../../resources/BaseJs.js" defer></script>
  <script type="text/javascript" src="../../resources/forest/Forest.js" defer></script>
</head>
<body  data-next="../Level403/Level403.html">
          <div id="gameArea">
			<svg class="forest" viewBox="0 0 100 100">
              <g class="edge" onclick='travelPath("edge_0", 26, 56, 54.00, 58.00, 82, 60)'>
  <path class="hitPath" d='m 26 56 Q 54.00 58.00 82 60'/>
  <path class='path' d='m 26 56 Q 54.00 58.00 82 60' stroke-dasharray="4 4"/>
  <foreignObject x="30" y="62" width="40px" height="7px">
    <textarea
      id="edge_0"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:3px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >Direction; }</textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_1", 34, 20, 30.00, 38.00, 26, 56)'>
  <path class="hitPath" d='m 34 20 Q 30.00 38.00 26 56'/>
  <path class='path' d='m 34 20 Q 30.00 38.00 26 56' stroke-dasharray="4 4"/>
  <foreignObject x="34" y="40" width="28px" height="7px">
    <textarea
      id="edge_1"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:3px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >{ .turn: </textarea>
    </foreignObject>
</g>

              <path id="currentTravelingPath" class="hitPath"/>
                <circle
    cx="34" cy="20"
    r="2"
    fill="red"
  />

  <circle
    cx="26" cy="56"
    r="2"
    fill="red"
  />

  <circle
    class="finishNode"
    cx="82" cy="60"
    r="2"
    fill="lightgreen"
  />

              
			  <foreignObject
			    id="foreignObjectCodeBox" x="0" y="0" width="0px" height="0px"
				style="pointer-events:none">
	            <textarea
	              id="codeBoxOverlayTop"
	              class="overlayTextarea"
	              style="width:100%;height:100%;font-size:3px;overflow-x:auto;border:1px solid orange;opacity:1"
	              name="ForestCodeBox"
	              wrap="soft"
	              autocomplete="off"
	              spellcheck="false"
	              readonly></textarea>
	            </foreignObject>
              <image
                id="currentNodeMarker"
                href="../../resources/forest/face.png"
                width="10"
                height="10"
              />
            </svg>
               <textarea class="overlayTextarea" id="output"
style="top:0%;left:70.00%;width:30%;height:70.00%;"
name="ForestOutputBox"
data-solution="/*&#10;Panic: It's quite easy to get&#10;lost here. Make sure to&#10;remember your directions!&#10;*/&#10;&#10;Direction:{ .turn: Direction; }"
data-original="/*&#10;Panic: It's quite easy to get&#10;lost here. Make sure to&#10;remember your directions!&#10;*/&#10;&#10;Direction:"
data-alternative=""
wrap="soft"
autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" readonly>/*&#10;Panic: It's quite easy to get&#10;lost here. Make sure to&#10;remember your directions!&#10;*/&#10;&#10;Direction:</textarea>

            <div class="buttonContainer">
              <div class="roundBtn" data-tooltip="Check your work">
                <button id="submitBtn">🎉</button>
                </div>
				<div class="roundBtn" data-tooltip="Undo">
                  <button id="undoBtn">↩</button>
                  </div>
              <div class="roundBtn" data-tooltip="Reset">
                <button id="resetBtn">⟳</button>
                </div>
              </div>
          </div>
  <div id="screenOverlay"></div>
  <div id="gameMessage" class="messageBox" style="display: none;"></div>
  <div id="levelEndCharacter" class="divFullScreenImage" hidden>
    <img src="../../resources/weDidIt.png" alt="We did it!" draggable="false">
    </div>
</div>
</body>
</html>
