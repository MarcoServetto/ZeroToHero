<body  data-next="../Level408/Level408.html">
          <div id="gameArea">
			<svg class="forest" viewBox="0 0 1000 1000"
			  style="background:url('../../resources/forest/forestDawn.png')">
			  
              <g class="edge" onclick='travelPath("edge_0", 200, 200, 240.00, 380.00, 280, 560)'>
  <path class="hitPath" d='m 200 200 Q 240.00 380.00 280 560'/>
  <path class='path' d='m 200 200 Q 240.00 380.00 280 560' stroke-dasharray="16 16"/>
  <foreignObject x="250" y="30" width="620px" height="130px">
    <textarea
      id="edge_0"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >Rotate3600:{&#10;  #(d: Direction): Direction-&gt; d&#10;</textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_1", 280, 560, 500.00, 310.00, 720, 560)'>
  <path class="hitPath" d='m 280 560 Q 500.00 310.00 720 560'/>

  <foreignObject x="450" y="520" width="240px" height="70px">
    <textarea
      id="edge_2"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >    .turn</textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_3", 280, 560, 500.00, 810.00, 720, 560)'>
  <path class="hitPath" d='m 280 560 Q 500.00 810.00 720 560'/>
  <path class='path' d='m 280 560 Q 500.00 810.00 720 560' stroke-dasharray="16 16"/>
  <foreignObject x="300" y="680" width="280px" height="110px">
    <textarea

      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >.turn&#10;</textarea>
    </foreignObject>
</g>
<g class="edge" onclick='travelPath("edge_4", 720, 560, 810.00, 720.00, 900, 880)'>
  <path class="hitPath" d='m 720 560 Q 810.00 720.00 900 880'/>
  <path class='path' d='m 720 560 Q 810.00 720.00 900 880' stroke-dasharray="16 16"/>
  <foreignObject x="720" y="760" width="140px" height="110px">
    <textarea
      id="edge_4"
      class="overlayTextarea"
      style="top:0%;left:0%;width:100%;height:100%;font-size:20px;overflow-x:auto;"
      name="ForestCodeBox"
      wrap="soft"
      autocomplete="off"
      spellcheck="false"
      readonly
      >.turn;&#10;  }&#10;</textarea>
    </foreignObject>
</g>

              <path id="currentTravelingPath" class="hitPath"/>
              <circle class=""
  cx="200" cy="200"
  r="15"
  fill="red"
/>
<circle class=""
  cx="280" cy="560"
  r="15"
  fill="red"
/>
<circle class=""
  cx="720" cy="560"
  r="15"
  fill="red"
/>
<circle class="finishNode"
  cx="900" cy="880"
  r="15"
  fill="lightgreen"
/>
              
			  <foreignObject
			    id="foreignObjectCodeBox" x="0" y="0" width="0px" height="0px"
				style="pointer-events:none">
	            <textarea
	              id="codeBoxOverlayTop"
	              class="overlayTextarea"
	              style="width:100%;height:100%;font-size:20px;overflow-x:auto;border:solid orange;opacity:1"
	              name="ForestCodeBox"
	              wrap="soft"
	              autocomplete="off"
	              spellcheck="false"
	              readonly></textarea>
	            </foreignObject>
              <image
                id="currentNodeMarker"
                href="../../resources/forest/face.png"
                width="80"
                height="80"
              />
            </svg>
            <textarea class="overlayTextarea" id="output"
style="top:0%;left:60.00%;width:40%;height:80.00%;overflow-x:auto;"
name="ForestOutputBox"

data-original="//The last tree trunk snapped like a charm!&#10;//you: Cool, let me do it even more!&#10;&#10;"
autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" readonly>//The last tree trunk snapped like a charm!&#10;//you: Cool, let me do it even more!&#10;&#10;</textarea>

            <div class="buttonContainer">
              <div class="roundBtn" data-tooltip="Check your work">
                <button id="submitBtn">🎉</button>
                </div>
				<div class="roundBtn" data-tooltip="Undo">
                  <button id="undoBtn">↩</button>
                  </div>
              <div class="roundBtn" data-tooltip="Reset">
                <button id="resetBtn">⟳</button>
                </div>
              </div>
          </div>
  <div id="screenOverlay"></div>
  <div id="gameMessage" class="messageBox" style="display: none;"></div>
  <div id="levelEndCharacter" class="divFullScreenImage" hidden>
    <img src="../../resources/weDidIt.png" alt="We did it!" draggable="false">
    </div>
  <div id="levelFail" class="divFullScreenImage" hidden>
    <img src="../../resources/walkFallEnd.png" alt="Oof!" draggable="false">
    </div>
</div>
