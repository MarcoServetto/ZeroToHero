 autocorrect="off" autocapitalize="off">
Direction: { .turn: Direction }
North: Direction { East  }
East : Direction { South }
South: Direction { West  }
West : Direction { North }

R:{
  .r(d: Direction): Direction -> d.turn;
  +(r: R): R-> { d -> this.r(r.r d) };
  .twice: R -> this + this;
  }
