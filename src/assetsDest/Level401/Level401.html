<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forest Minigame</title>
  <link rel="stylesheet" href="../../resources/FontsSetUp.css">
  <link rel="stylesheet" href="../../resources/BaseStyle.css">
  <link rel="stylesheet" href="../../resources/RoundButtonsStyle.css">
  <link rel="stylesheet" href="../../resources/forest/Forest.css">
  <script type="text/javascript" src="../../resources/BaseJs.js" defer></script>
  <script type="text/javascript" src="../../resources/forest/Forest.js" defer></script>
</head>
<body>
          <div id="gameArea">
			<svg class="forest" viewBox="0 0 100 100">
              <g class="edge">
  <path class="hitPath" d='m 0 0 Q 27.68 -7.68 20 20' onclick='travelPath("{}", 0, 0, 27.68, -7.68, 20, 20)' />
  <path class='path' d='m 0 0 Q 27.68 -7.68 20 20' stroke-dasharray="4 4"/>
</g>
<g class="edge">
  <path class="hitPath" d='m 0 0 Q 10.00 10.00 20 20' onclick='travelPath(":", 0, 0, 10.00, 10.00, 20, 20)' />
  <path class='path' d='m 0 0 Q 10.00 10.00 20 20' stroke-dasharray="4 4"/>
</g>
<g class="edge">
  <path class="hitPath" d='m 0 0 Q -7.68 27.68 20 20' onclick='travelPath("Direction", 0, 0, -7.68, 27.68, 20, 20)' />
  <path class='path' d='m 0 0 Q -7.68 27.68 20 20' stroke-dasharray="4 4"/>
</g>
<g class="edge">
  <path class="hitPath" d='m 20 20 Q 35.00 20.00 50 20' onclick='travelPath("North:Direction{}", 20, 20, 35.00, 20.00, 50, 20)' />
  <path class='path' d='m 20 20 Q 35.00 20.00 50 20' stroke-dasharray="4 4"/>
</g>
<g class="edge">
  <path class="hitPath" d='m 50 20 Q 70.00 10.00 90 20' onclick='travelPath("North:Direction{}", 50, 20, 70.00, 10.00, 90, 20)' />
  <path class='path' d='m 50 20 Q 70.00 10.00 90 20' stroke-dasharray="4 4"/>
</g>
<g class="edge">
  <path class="hitPath" d='m 50 20 Q 70.00 30.00 90 20' onclick='travelPath("East:Direction{}", 50, 20, 70.00, 30.00, 90, 20)' />
  <path class='path' d='m 50 20 Q 70.00 30.00 90 20' stroke-dasharray="4 4"/>
</g>

              <path id="currentTravelingPath" class="hitPath"/>
                <circle
    cx="0" cy="0"
    r="2"
    fill="red"
  />

  <circle
    cx="20" cy="20"
    r="2"
    fill="red"
  />

  <circle
    cx="40" cy="40"
    r="2"
    fill="red"
  />

  <circle
    cx="50" cy="50"
    r="2"
    fill="red"
  />

  <circle
    cx="100" cy="100"
    r="2"
    fill="red"
  />

  <circle
    cx="50" cy="20"
    r="2"
    fill="red"
  />

  <circle
    cx="90" cy="20"
    r="2"
    fill="red"
  />

  <circle
    cx="100" cy="30"
    r="2"
    fill="red"
  />


              <image
                id="currentNodeMarker"
                href="../../resources/forest/face.png"
                width="10"
                height="10"
              />
            </svg>
               <textarea class="overlayTextarea" id="output"
style="top:0%;left:70.00%;width:30%;height:70.00%;"
name="ForestOutputBox"
data-solution="North:Direction{}"
data-original="North:Direction"
data-alternative=""
wrap="soft"
autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" readonly>North:Direction</textarea>

            <div class="buttonContainer">
              <div class="roundBtn" data-tooltip="Check your work">
                <button id="submitBtn">🎉</button>
                </div>
              <div class="roundBtn" data-tooltip="Reset">
                <button id="resetBtn">⟳</button>
                </div>
              <div class="roundBtn" data-tooltip="Undo">
                <button id="undoBtn">⟳</button>
                </div>
              </div>
          </div>
  <div id="screenOverlay"></div>
  <div id="gameMessage" class="messageBox" style="display: none;"></div>
  <div id="levelEndCharacter" class="divFullScreenImage" hidden>
    <img src="../../resources/weDidIt.png" alt="We did it!" draggable="false">
    </div>
</div>
</body>
</html>
