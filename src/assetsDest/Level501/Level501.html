<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fearless Fishing</title>
  <link rel="stylesheet" href="../../resources/FontsSetUp.css">
  <link rel="stylesheet" href="../../resources/BaseStyle.css">
  <link rel="stylesheet" href="../../resources/RoundButtonsStyle.css">
  <link rel="stylesheet" href="../../resources/fishing/Fishing.css">
  <script type="text/javascript" src="../../resources/BaseJs.js" defer></script>
  <script type="text/javascript" src="../../resources/Score.js" defer></script>
  <script type="text/javascript" src="../../resources/fishing/Fishing.js" defer></script>
  <script>globalThis.level = [
"when near YOU","type this TEXT","type to CATCH!"];
</script>
</head>
<body data-required="10" data-next="../Level502/Level502.html">
  <div id="gameArea">
    <div class="topSection">
      <div class="topCenter">
        <div id="leashBox">
          <div id="leashBar"></div>
        </div>
      </div>
      <div class="topRight">
        <div id="scoreCounter"><div id="scoreDisplay">0</div></div>
        <div class="scoreText">
          <p>current combo: <span id="currentBonus">1</span></p>
          <p>required for next level: <span id="requiredPoints">120</span></p>
        </div>
      </div>
    </div>
    <div id="pond" class="fishing-background" tabindex="0" aria-label="Fishing typing area">
      <div id="centreWater"></div>
      <div id="fishes"></div>
      <div id="rodLine"></div>
    </div>
    <div id="screenOverlay"></div>
    <div id="gameMessage" class="messageBox" style="display: none;"></div>
    <div id="levelEndCharacter" class="divFullScreenImage" hidden>
      <img src="../../resources/weDidIt.png" alt="We did it!" draggable="false">
    </div>
  </div>
</body>
</html>
